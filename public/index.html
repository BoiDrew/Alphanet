<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supply Request Tracker</title>
  <link rel="stylesheet" href="assets/css/styles.css">
  <link rel="icon"href="/assets/images/favicon.ico">

</head>

<body>
<div class="wrap" style="position:relative;">
<h2 class="sr-only">
  Cleaning company supply request tracker with analytics
</h2>

<!-- HEADER -->

<div class="header-bar">

<div>

<div class="title">
Supply request tracker
</div>

<div class="subtitle">
Products, materials & analytics
</div>

</div>

<div class="header-actions">

<button
class="btn btn-primary"
onclick="gotoNew()">

+ New request

</button>

<button
class="btn"
onclick="showPage('analytics')">

Analytics

</button>

</div>

</div>

<!-- NAVIGATION -->

<div class="nav"
id="main-nav">

<button
class="tab active"
onclick="switchTab('pending')">

Pending
<span class="cnt"
id="cnt-pending">0</span>

</button>

<button
class="tab"
onclick="switchTab('urgent')">

Urgent
<span class="cnt"
id="cnt-urgent">0</span>

</button>

<button
class="tab"
onclick="switchTab('ordered')">

Ordered
<span class="cnt"
id="cnt-ordered">0</span>

</button>

<button
class="tab"
onclick="switchTab('done')">

Done
<span class="cnt"
id="cnt-done">0</span>

</button>

<button
class="tab"
onclick="switchTab('all')">

All
<span class="cnt"
id="cnt-all">0</span>

</button>

</div>

<!-- REQUEST LIST -->

<div id="page-list">

<div class="filter-row">

<select
id="filter-site"
onchange="render()">

<option value="">
All job sites
</option>

</select>

<select
id="filter-cat"
onchange="render()">

<option value="">
All categories
</option>

</select>

<input
type="text"
id="filter-search"
placeholder="Search requests..."
oninput="render()">

</div>

<div id="list-body"></div>

</div>

<!-- NEW REQUEST PAGE -->

<div id="page-new"
style="display:none;">

<div class="card">

<div class="section-title">
New supply request
</div>

<!-- form content stays same -->

</div>

</div>

<!-- ANALYTICS PAGE -->

<div id="page-analytics"
style="display:none;">

<div class="analytics-header">

<div class="section-title">
Analytics dashboard
</div>

<button
class="btn btn-sm"
onclick="showPage('list')">

Back to requests

</button>

</div>

<div
class="metric-grid"
id="kpi-row"></div>

<div
class="grid2">

<div class="card">

<div class="section-hd">
Requests by job site
</div>

<div id="chart-site"></div>

</div>

<div class="card">

<div class="section-hd">
Requests by category
</div>

<div id="chart-cat"></div>

</div>

</div>

</div>

<div class="toast"
id="toast"></div>

</div>

<!-- CHART LIBRARY -->

<script
src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js">
</script>

<!-- MAIN APP -->

<script
src="/assets/js/app.js">
</script>

</body>

</html>
